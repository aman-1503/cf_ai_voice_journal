name = "cf-ai-voice-journal"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding
[ai]
binding = "AI"

# Durable Objects for persistent state
[[durable_objects.bindings]]
name = "JOURNAL"
class_name = "JournalDurableObject"

# Migrations for Durable Objects
[[migrations]]
tag = "v1"
new_sqlite_classes = ["JournalDurableObject"]

# Serve static assets from /public
[assets]
directory = "./public"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Environment-specific settings
[env.production]
name = "cf-ai-voice-journal-prod"
routes = [
  { pattern = "voice-journal.example.com", custom_domain = true }
]
